name: Daily Nuball Notification

on:
  schedule:
    - cron: '0 21 * * *'  # UTC 21:00 = KST 06:00 목표 (지연 고려)
  workflow_dispatch:

jobs:
  send-notifications:
    runs-on: ubuntu-latest
    steps:
      - name: Send daily notifications
        run: |
          curl -s -X POST https://nuball.app/api/send-notifications \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -w "\nHTTP Status: %{http_code}\n"
